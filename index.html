// ─── HELPERS ────────────────────────────────────────────────────────────────
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
const esc = (s) => String(s || "");
const fmtDate = (d) => {
  if (!d) return "—";
  try { return new Date(d).toLocaleDateString("fr-FR", { day: "2-digit", month: "short", year: "numeric" }); }
  catch { return d; }
};
const today = () => new Date().toISOString().split("T")[0];

const LS = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// Correspondance intelligente entre un nom de ligne de bon et un produit catalogue
// Stratégies : ref exacte, nom exact, mots-clés communs (≥2 mots de 4+ lettres)
const matchProduit = (ligne, produit) => {
  const ref1 = (ligne.ref || "").toLowerCase().trim();
  const ref2 = (produit.ref || "").toLowerCase().trim();
  if (ref1 && ref2 && ref1 === ref2) return true;

  const n1 = (ligne.name || ligne.nom || "").toLowerCase();
  const n2 = (produit.name || "").toLowerCase();
  if (!n1 || !n2) return false;

  // Correspondance exacte
  if (n1 === n2) return true;
  // L'un contient l'autre
  if (n1.includes(n2) || n2.includes(n1)) return true;

  // Mots significatifs communs (longueur ≥ 4, ignorer mots vides)
  const stopWords = new Set(["les","des","par","pour","avec","sur","vol","ml","cl","75","750","1000","rouge","blanc","rose","rosé","sec","demi"]);
  const mots1 = n1.split(/[\s\-\[\]\.\/,]+/).filter(m => m.length >= 4 && !stopWords.has(m));
  const mots2 = n2.split(/[\s\-\[\]\.\/,]+/).filter(m => m.length >= 4 && !stopWords.has(m));
  const communs = mots1.filter(m => mots2.some(m2 => m2.includes(m) || m.includes(m2)));
  return communs.length >= 2;
};

// ─── STYLES ─────────────────────────────────────────────────────────────────
const S = {

  sidebar: { width:220, minWidth:220, background:"#fff", borderRight:"1px solid #E4E2D8", display:"flex", flexDirection:"column", height:"100%" },

  navItem: (active) => ({

    cursor:"pointer", fontWeight:active?700:500, fontSize:13, border:"none", background:active?"#EEF2FD":"transparent",

  navBadge: { marginLeft:"auto", background:"#2A5BD7", color:"#fff", fontSize:11, fontWeight:700, padding:"1px 7px", borderRadius:20 },
  sidebarFooter: { padding:14, borderTop:"1px solid #E4E2D8", fontSize:11, color:"#B0AEA6" },
  main: { flex:1, display:"flex", flexDirection:"column", overflow:"hidden" },
  topbar: { background:"#fff", borderBottom:"1px solid #E4E2D8", padding:"0 16px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexShrink:0 },
  pageTitle: { fontSize:17, fontWeight:800 },
  pageSub: { fontSize:12, color:"#9A9890", marginTop:1 },
  topActions: { display:"flex", gap:8 },
  content: { flex:1, overflowY:"auto", padding:28 },
  btn: (variant="secondary") => {
    const base = { display:"inline-flex", alignItems:"center", gap:6, padding:"8px 16px", borderRadius:8, fontFamily:"inherit", fontSize:13, fontWeight:700, cursor:"pointer", border:"none", transition:"all 0.15s", whiteSpace:"nowrap" };

      success: { background:"#1A8A5A", color:"#fff" },

  },
  card: { background:"#fff", border:"1px solid #E4E2D8", borderRadius:12, boxShadow:"0 1px 3px rgba(0,0,0,0.05)" },
  cardHeader: { padding:"16px 20px", borderBottom:"1px solid #E4E2D8", display:"flex", alignItems:"center", justifyContent:"space-between" },
  cardTitle: { fontSize:14, fontWeight:800, display:"flex", alignItems:"center", gap:7 },
  statsRow: { display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:14, marginBottom:24 },
  statCard: { background:"#fff", border:"1px solid #E4E2D8", borderRadius:12, padding:"18px 20px" },
  statLabel: { fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#9A9890", marginBottom:6 },
  statValue: (color="#2A5BD7") => ({ fontSize:26, fontWeight:800, color, lineHeight:1 }),
  statSub: { fontSize:12, color:"#9A9890", marginTop:4 },
  table: { width:"100%", borderCollapse:"collapse" },
  th: { textAlign:"left", fontSize:11, fontWeight:700, letterSpacing:"0.07em", textTransform:"uppercase", color:"#9A9890", padding:"9px 14px", background:"#F4F3EE", borderBottom:"1px solid #E4E2D8" },
  td: { padding:"12px 14px", borderBottom:"1px solid #E4E2D8", verticalAlign:"middle" },
  tdName: { fontWeight:700, color:"#2A5BD7", cursor:"pointer", textDecoration:"none" },
  tdRef: { fontFamily:"monospace", fontSize:12, color:"#9A9890" },
  stockPill: (type) => {

  },
  searchBar: { display:"flex", alignItems:"center", gap:8, background:"#F4F3EE", border:"1px solid #E4E2D8", borderRadius:8, padding:"7px 12px", flex:1, maxWidth:300 },
  searchInput: { border:"none", background:"transparent", fontFamily:"inherit", fontSize:13, color:"#1C1B18", outline:"none", width:"100%" },
  field: { display:"flex", flexDirection:"column", gap:5 },
  fieldLabel: { fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#9A9890" },
  input: { fontFamily:"inherit", fontSize:14, padding:"9px 12px", border:"1.5px solid #E4E2D8", borderRadius:8, background:"#fff", color:"#1C1B18", outline:"none" },
  inputFocus: { borderColor:"#2A5BD7" },
  uploadZone: (drag) => ({ border:`2px dashed ${drag?"#2A5BD7":"#E4E2D8"}`, borderRadius:12, padding:"36px 20px", textAlign:"center", cursor:"pointer", background:drag?"#EEF2FD":"#F4F3EE", transition:"all 0.2s" }),
  alert: (type) => {
    const map = { info:["#EEF2FD","#2A5BD7","rgba(42,91,215,0.15)"], warning:["#FFF8E6","#C47A00","rgba(196,122,0,0.15)"], success:["#EDFAF3","#1A8A5A","rgba(26,138,90,0.15)"], danger:["#FDECEB","#C0392B","rgba(192,57,43,0.15)"] };
    const [bg, color, border] = map[type]||map.info;
    return { background:bg, color, border:`1px solid ${border}`, borderRadius:8, padding:"12px 14px", fontSize:13, fontWeight:500, display:"flex", alignItems:"flex-start", gap:9, marginBottom:14 };
  },
  modal: { position:"fixed", inset:0, background:"rgba(20,18,14,0.55)", backdropFilter:"blur(4px)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:20 },
  modalBox: { background:"#fff", borderRadius:16, width:"100%", maxWidth:560, maxHeight:"88vh", overflowY:"auto", boxShadow:"0 16px 48px rgba(0,0,0,0.15)" },
  modalHeader: { padding:"20px 24px 16px", borderBottom:"1px solid #E4E2D8", display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12 },
  modalTitle: { fontSize:17, fontWeight:800 },
  modalSub: { fontSize:12, color:"#9A9890", marginTop:2 },
  modalBody: { padding:"20px 24px" },
  modalFooter: { padding:"14px 24px", borderTop:"1px solid #E4E2D8", display:"flex", justifyContent:"flex-end", gap:8 },
  closeBtn: { background:"#F4F3EE", border:"none", borderRadius:8, width:30, height:30, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"#9A9890" },
  parsedRow: { display:"flex", alignItems:"flex-start", gap:8, padding:"8px 0", borderBottom:"1px solid rgba(26,138,90,0.12)" },
  processing: { background:"#EEF2FD", border:"1px solid rgba(42,91,215,0.2)", borderRadius:10, padding:16, display:"flex", alignItems:"center", gap:14, marginTop:14 },
  aiResult: { background:"#EDFAF3", border:"1px solid rgba(26,138,90,0.2)", borderRadius:10, padding:16 },

  bonHeader: { background:"#F4F3EE", border:"1px solid #E4E2D8", borderRadius:10, padding:"14px 18px", marginBottom:14, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14 },

  bonInfoValue: { fontSize:14, fontWeight:700, marginTop:3 },
  spinner: { width:26, height:26, border:"3px solid rgba(42,91,215,0.2)", borderTopColor:"#2A5BD7", borderRadius:"50%", animation:"spin 0.8s linear infinite", flexShrink:0 },
  emptyState: { textAlign:"center", padding:"48px 20px", color:"#9A9890" },
  toast: (type) => {
    const colors = { success:"#1A8A5A", warning:"#C47A00", danger:"#C0392B", default:"#1C1B18" };
    return { position:"fixed", bottom:24, right:24, background:colors[type]||colors.default, color:"#fff", padding:"12px 18px", borderRadius:10, fontSize:13, fontWeight:600, boxShadow:"0 8px 24px rgba(0,0,0,0.15)", zIndex:999, display:"flex", alignItems:"center", gap:8, animation:"slideIn 0.25s ease-out" };
  },
};

// ─── ICONS ───────────────────────────────────────────────────────────────────
const Icon = ({ d, size=16, stroke=2 }) => (

  check: "M20 6 9 17l-5-5",
  info: "M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20zM12 8v4M12 16h.01",
  search: "M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0",

  warn: "M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01",
};

// ─── TOAST ───────────────────────────────────────────────────────────────────
function Toast({ msg, type, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
  return <div style={S.toast(type)}>✓ {msg}</div>;
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function Modal({ title, sub, onClose, children, footer, wide }) {
  return (
    <div style={S.modal} onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div style={{ ...S.modalBox, maxWidth: wide ? 680 : 520 }}>
        <div style={S.modalHeader}>
          <div>
            <div style={S.modalTitle}>{title}</div>
            {sub && <div style={S.modalSub}>{sub}</div>}
          </div>
          <button style={S.closeBtn} onClick={onClose}><Icon d={Icons.x} size={14}/></button>
        </div>
        <div style={S.modalBody}>{children}</div>
        {footer && <div style={S.modalFooter}>{footer}</div>}
      </div>
    </div>
  );
}

// ─── FIELD ───────────────────────────────────────────────────────────────────
function Field({ label, children }) {
  return <div style={S.field}><label style={S.fieldLabel}>{label}</label>{children}</div>;
}
function Input({ ...props }) {
  const [focused, setFocused] = useState(false);
  return <input style={{ ...S.input, ...(focused ? S.inputFocus : {}) }} onFocus={() => setFocused(true)} onBlur={() => setFocused(false)} {...props}/>;
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────
function App() {
  const [produits, setProduits] = useState([]);
  const [bons, setBons] = useState([]);
  const [panel, setPanel] = useState("dashboard");
  const [toast, setToast] = useState(null);
  const [modal, setModal] = useState(null); // "addProduct"|"editProduct"|"history"|"bon"
  const [editProduct, setEditProduct] = useState(null);
  const [historyProduct, setHistoryProduct] = useState(null);
  const [detailBon, setDetailBon] = useState(null);
  const [searchProd, setSearchProd] = useState("");
  const [searchBons, setSearchBons] = useState("");

  // Load
  useEffect(() => {
    setProduits(LS.get("wh_produits") || []);
    setBons(LS.get("wh_bons") || []);
  }, []);

  const saveProduits = (list) => { setProduits(list); LS.set("wh_produits", list); };
  const saveBons = (list) => { setBons(list); LS.set("wh_bons", list); };
  const showToast = (msg, type = "default") => setToast({ msg, type, id: uid() });

  // ── NAV ──
  const navItems = [
    { key:"dashboard", label:"Tableau de bord", icon:Icons.grid },
    { key:"produits", label:"Produits", icon:Icons.box },
    { key:"bons", label:"Bons de livraison", icon:Icons.file },
    { key:"import", label:"Importer un bon", icon:Icons.upload },
  ];
  const pageTitles = {
    dashboard: ["Tableau de bord", "Vue d'ensemble de votre entrepôt"],
    produits: ["Produits", "Gérez votre catalogue et vos stocks"],
    bons: ["Bons de livraison", "Historique de tous les bons traités"],
    import: ["Importer un bon", "Analysez un PDF via l'IA ou saisissez manuellement"],
  };

  // ── STATS ──
  const statsLow = produits.filter(p => p.stock > 0 && p.stock <= 5).length;
  const statsEmpty = produits.filter(p => p.stock <= 0).length;

  // ── STOCK HELPERS ──
  const stockType = (p) => p.stock <= 0 ? "empty" : p.stock <= 5 ? "low" : "ok";
  const stockLabel = (p) => p.stock <= 0 ? "⛔ Rupture" : p.stock <= 5 ? `⚠️ ${p.stock}` : `✓ ${p.stock}`;

  // ── PRODUCT MODAL ──
  const openAdd = () => { setEditProduct({ ref:"", name:"", client:"", addr:"", stock:0 }); setModal("addProduct"); };
  const openEdit = (p) => { setEditProduct({ ...p }); setModal("editProduct"); };
  const saveProductModal = () => {
    const p = editProduct;
    if (!p.ref.trim() || !p.name.trim()) { showToast("Référence et nom obligatoires", "warning"); return; }
    if (modal === "addProduct") {
      const np = { ...p, id: uid(), stock: parseInt(p.stock)||0, stockInit: parseInt(p.stock)||0 };
      const list = [np, ...produits];
      saveProduits(list);
      showToast("Produit ajouté ✓", "success");
    } else {
      const list = produits.map(x => x.id === p.id ? { ...x, ref:p.ref, name:p.name, client:p.client, addr:p.addr, stock:parseInt(p.stock)||0 } : x);
      saveProduits(list);
      showToast("Produit mis à jour ✓", "success");
    }
    setModal(null);
  };
  const deleteProduct = (id) => {
    if (!confirm("Supprimer ce produit ?")) return;
    saveProduits(produits.filter(p => p.id !== id));
    showToast("Produit supprimé");
  };

  // ── HISTORY ──
  const openHistory = (p) => { setHistoryProduct(p); setModal("history"); };
  const getProductLines = (p) => {
    const lines = [];
    bons.forEach(bon => bon.lignes.forEach(l => {
      if (matchProduit(l, p)) lines.push({ bon, qty: l.qty });
    }));
    return lines;
  };

  // ── BON DETAIL ──
  const openBon = (b) => { setDetailBon(b); setModal("bon"); };
  const deleteBon = (id) => {
    if (!confirm("Supprimer ce bon ? Les stocks ne seront pas restaurés.")) return;
    saveBons(bons.filter(b => b.id !== id));
    setModal(null);
    showToast("Bon supprimé");
  };

  // ── VALIDATE IMPORT ──
  const validateImport = (bon) => {
    let deductions = 0;
    const updated = [...produits];
    bon.lignes.forEach(l => {
      const idx = updated.findIndex(p => matchProduit(l, p));
      if (idx !== -1) { updated[idx] = { ...updated[idx], stock: Math.max(0, updated[idx].stock - l.qty) }; deductions++; }
    });
    saveProduits(updated);
    const newBon = { ...bon, id: uid() };
    saveBons([...bons, newBon]);
    showToast(`Bon ${bon.number} enregistré — ${deductions} produit(s) décompté(s)`, "success");
    return newBon;
  };

  // ── FILTERED LISTS ──
  const filteredProd = produits.filter(p => {
    const q = searchProd.toLowerCase();
    return !q || p.ref.toLowerCase().includes(q) || p.name.toLowerCase().includes(q) || (p.client||"").toLowerCase().includes(q);
  });
  const filteredBons = [...bons].reverse().filter(b => {
    const q = searchBons.toLowerCase();
    return !q || b.number.toLowerCase().includes(q) || (b.client||"").toLowerCase().includes(q);
  });

  return (
    <>
      <div style={S.app}>
        {/* SIDEBAR DESKTOP */}
        <aside className="desktop-sidebar" style={S.sidebar}>
          <div style={S.sidebarLogo}>
            <div style={S.logoMark}>📦 StockPilot</div>
            <div style={S.logoSub}>Gestion d'entrepôt</div>
          </div>
          <nav style={S.sidebarNav}>
            <div style={S.navLabel}>Navigation</div>
            {navItems.map(n => (
              <button key={n.key} style={S.navItem(panel === n.key)} onClick={() => setPanel(n.key)}>
                <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"><path d={n.icon}/></svg>
                {n.label}
                {n.key === "produits" && <span style={S.navBadge}>{produits.length}</span>}
                {n.key === "bons" && <span style={S.navBadge}>{bons.length}</span>}
              </button>
            ))}
          </nav>
          <div style={S.sidebarFooter}>v1.0 · Données locales sauvegardées</div>
        </aside>

        {/* MAIN */}
        <main style={S.main}>
          <div style={S.topbar}>
            <div>
              <div style={S.pageTitle}>{pageTitles[panel][0]}</div>
              <div style={S.pageSub}>{pageTitles[panel][1]}</div>
            </div>
            <div className="desktop-topbar-actions" style={S.topActions}>
              <button style={S.btn("secondary")} onClick={() => setPanel("import")}>
                <svg width={14} height={14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.upload}/></svg>
                Importer un bon

// ─── IMPORT ──────────────────────────────────────────────────────────────────
function Import({ produits, validateImport, showToast, setPanel }) {
  const [mode, setMode] = useState("choice"); // "choice"|"upload"|"paste"|"result"
  const [apiKey, setApiKey] = useState(() => LS.get("wh_apikey") || "");
  const [showKeyInput, setShowKeyInput] = useState(false);
  const [file, setFile] = useState(null);
  const [b64, setB64] = useState(null);
  const [loading, setLoading] = useState(false);
  const [uploadError, setUploadError] = useState("");
  const [jsonText, setJsonText] = useState("");
  const [result, setResult] = useState(null);
  const [done, setDone] = useState(null);
  const [jsonError, setJsonError] = useState("");
  const fileRef = useRef();

  const saveApiKey = (key) => { setApiKey(key); LS.set("wh_apikey", key); };

  const handleFile = (f) => {
    if (!f) return;
    if (!f.type.startsWith("image/") && f.type !== "application/pdf") {
      setUploadError("Format non supporté — PDF, JPG ou PNG uniquement"); return;
    }
    setFile(f); setUploadError("");
    const reader = new FileReader();
    reader.onload = (e) => setB64(e.target.result.split(",")[1]);
    reader.readAsDataURL(f);
  };

  const analyze = async () => {
    if (!file || !b64) return;
    if (!apiKey.trim()) { setShowKeyInput(true); return; }
    setLoading(true); setUploadError("");
    const isImg = file.type.startsWith("image/");
    const productList = produits.map(p => `- Ref: ${p.ref} | Nom: ${p.name}`).join("
") || "Aucun produit";
    const system = `Tu es un assistant specialise dans la lecture de bons de livraison. Retourne UNIQUEMENT un JSON valide sans backticks ni texte autour. Format strict: {"numero_bon":"string","numero_commande":"string","date":"YYYY-MM-DD","client":"string","adresse":"string","lignes":[{"ref":"string","nom":"string","quantite":1}]}. Champs absents = chaine vide. quantite = entier positif.`;
    const userText = `Produits en stock:
${productList}

Analyse ce bon de livraison et retourne UNIQUEMENT le JSON.`;
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": apiKey.trim(), "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 2000,
          system,
          messages: [{ role: "user", content: [
            isImg
              ? { type: "image", source: { type: "base64", media_type: file.type, data: b64 } }
              : { type: "document", source: { type: "base64", media_type: "application/pdf", data: b64 } },
            { type: "text", text: userText }
          ]}]
        })
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        if (resp.status === 401) throw new Error("Clé API invalide — vérifiez votre clé Anthropic");
        throw new Error(err.error?.message || `Erreur serveur ${resp.status}`);
      }
      const data = await resp.json();
      const raw = data.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { throw new Error("Réponse IA illisible, réessayez"); }
      if (!Array.isArray(parsed.lignes)) parsed.lignes = [];
      setResult({
        number: parsed.numero_bon || "",
        commande: parsed.numero_commande || "",
        date: parsed.date || today(),
        client: parsed.client || "",
        addr: parsed.adresse || "",
        lignes: parsed.lignes.map(l => ({ ref: l.ref || "", name: l.nom || "", qty: parseInt(l.quantite) || 1 }))
      });
      setMode("result");
    } catch(e) {
      setUploadError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const parseJson = () => {
    setJsonError("");
    try {
      const parsed = JSON.parse(jsonText.trim());
      if (!Array.isArray(parsed.lignes)) parsed.lignes = [];
      setResult({
        number: parsed.numero_bon || "",
        commande: parsed.numero_commande || "",
        date: parsed.date || today(),
        client: parsed.client || "",
        addr: parsed.adresse || "",
        lignes: parsed.lignes.map(l => ({ ref: l.ref || "", name: l.nom || "", qty: parseInt(l.quantite) || 1 }))
      });
      setMode("result");
    } catch(e) {
      setJsonError("JSON invalide. Copiez bien le JSON complet fourni par Claude.");
    }
  };

  const openManual = () => {
    setResult({ number:"", commande:"", date:today(), client:"", addr:"", lignes:[{ref:"",name:"",qty:1},{ref:"",name:"",qty:1},{ref:"",name:"",qty:1}] });
    setMode("result");
  };

  const addLine = () => setResult(r => ({...r, lignes:[...r.lignes, {ref:"",name:"",qty:1}]}));
  const removeLine = (i) => setResult(r => ({...r, lignes:r.lignes.filter((_,j)=>j!==i)}));
  const updateLine = (i, field, val) => setResult(r => ({...r, lignes:r.lignes.map((l,j)=>j===i?{...l,[field]:val}:l)}));

  const validate = () => {
    if (!result.number.trim()) { showToast("Numéro de bon obligatoire", "warning"); return; }
    if (result.lignes.filter(l=>l.name||l.ref).length === 0) { showToast("Ajoutez au moins une ligne produit", "warning"); return; }
    const bon = { ...result, commande: result.commande||"", lignes: result.lignes.filter(l=>l.name||l.ref) };
    const saved = validateImport(bon);
    setDone(saved);
    setResult(null);
  };

  const reset = () => { setMode("choice"); setJsonText(""); setFile(null); setB64(null); setResult(null); setDone(null); setJsonError(""); setUploadError(""); if(fileRef.current) fileRef.current.value=""; };

  // ── ÉCRAN SUCCÈS ──
  if (done) return (
    <div style={S.card}>
      <div style={S.modalBody}>
        <div style={{...S.alert("success"), marginBottom:16}}>
          <svg width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.check}/></svg>
          <div><div style={{fontWeight:800,marginBottom:2}}>Bon {done.number} enregistré !</div><div style={{fontSize:12}}>Stocks mis à jour avec succès.</div></div>
        </div>
        <div style={{display:"flex", gap:10}}>
          <button style={{...S.btn("secondary"), flex:1, justifyContent:"center"}} onClick={reset}>Importer un autre bon</button>
          <button style={{...S.btn("primary"), flex:1, justifyContent:"center"}} onClick={() => setPanel("bons")}>Voir les bons</button>
        </div>
      </div>
    </div>
  );

  // ── ÉCRAN CHOIX ──
  if (mode === "choice") return (
    <div>
      {/* Bannière clé API */}
      {!apiKey && (
        <div style={{...S.alert("warning"), marginBottom:16}}>
          <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.warn}/></svg>
          <div>
            <div style={{fontWeight:700, marginBottom:4}}>Clé API Anthropic requise pour l'analyse automatique</div>
            <button style={{...S.btn("primary"), fontSize:12, padding:"5px 12px", marginTop:4}} onClick={() => setShowKeyInput(v => !v)}>
              🔑 Configurer ma clé API
            </button>
          </div>
        </div>
      )}

      {/* Saisie clé API */}
      {showKeyInput && (
        <div style={{...S.card, marginBottom:16}}>
          <div style={S.modalBody}>
            <div style={{fontWeight:700, fontSize:14, marginBottom:8}}>🔑 Clé API Anthropic</div>
            <div style={{fontSize:13, color:"#9A9890", marginBottom:10}}>
              Obtenez votre clé sur <strong>console.anthropic.com</strong> → API Keys → Create Key.<br/>
              Elle est stockée uniquement sur votre appareil.
            </div>
            <div style={{display:"flex", gap:8}}>
              <input
                type="password"
                placeholder="sk-ant-..."
                defaultValue={apiKey}
                id="apikey-input"
                style={{...S.input, flex:1, fontSize:13}}
              />
              <button style={S.btn("primary")} onClick={() => {
                const val = document.getElementById("apikey-input").value.trim();
                if (val) { saveApiKey(val); setShowKeyInput(false); showToast("Clé API enregistrée ✓", "success"); }
              }}>Enregistrer</button>
            </div>
          </div>
        </div>
      )}

      <div style={{display:"flex", flexDirection:"column", gap:12, maxWidth:480, margin:"0 auto"}}>

        {/* Option 1 — Upload PDF direct */}
        <div style={{...S.card, cursor:"pointer", border: apiKey ? "1px solid #E4E2D8" : "1px solid #E4E2D8", opacity: apiKey ? 1 : 0.6}} onClick={() => apiKey ? setMode("upload") : setShowKeyInput(true)}>
          <div style={{padding:"20px 22px", display:"flex", alignItems:"center", gap:16}}>
            <div style={{fontSize:36, flexShrink:0}}>📄</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:800, fontSize:15, marginBottom:3}}>Analyser un PDF directement</div>
              <div style={{fontSize:13, color:"#9A9890"}}>Importez votre bon, l'IA l'analyse automatiquement</div>
              <div style={{marginTop:8, display:"flex", gap:6, flexWrap:"wrap"}}>
                <span style={{background:"#EDFAF3", color:"#1A8A5A", fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20}}>✓ Analyse automatique</span>
                {!apiKey && <span style={{background:"#FFF8E6", color:"#C47A00", fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20}}>⚠ Clé API requise</span>}
              </div>
            </div>
          </div>
        </div>

        {/* Option 2 — Coller JSON */}
        <div style={{...S.card, cursor:"pointer"}} onClick={() => setMode("paste")}>
          <div style={{padding:"20px 22px", display:"flex", alignItems:"center", gap:16}}>
            <div style={{fontSize:36, flexShrink:0}}>📋</div>
            <div>
              <div style={{fontWeight:800, fontSize:15, marginBottom:3}}>Coller le JSON de Claude</div>
              <div style={{fontSize:13, color:"#9A9890"}}>Envoyez le PDF dans ce chat → copiez le JSON → collez ici</div>
              <div style={{marginTop:8}}>
                <span style={{background:"#EEF2FD", color:"#2A5BD7", fontSize:11, fontWeight:700, padding:"3px 10px", borderRadius:20}}>✓ Sans clé API</span>
              </div>
            </div>
          </div>
        </div>

        {/* Option 3 — Manuel */}
        <div style={{...S.card, cursor:"pointer"}} onClick={openManual}>
          <div style={{padding:"20px 22px", display:"flex", alignItems:"center", gap:16}}>
            <div style={{fontSize:36, flexShrink:0}}>✏️</div>
            <div>
              <div style={{fontWeight:800, fontSize:15, marginBottom:3}}>Saisie manuelle</div>
              <div style={{fontSize:13, color:"#9A9890"}}>Entrez les informations du bon à la main</div>
            </div>
          </div>
        </div>

        {/* Gérer la clé API */}
        {apiKey && (
          <button style={{...S.btn("ghost"), fontSize:12, color:"#9A9890", justifyContent:"center"}} onClick={() => setShowKeyInput(v => !v)}>
            🔑 {showKeyInput ? "Masquer" : "Modifier ma clé API"}
          </button>
        )}
      </div>
    </div>
  );

  // ── ÉCRAN UPLOAD PDF ──
  if (mode === "upload") return (
    <div style={{maxWidth:520}}>
      <button style={{...S.btn("ghost"), marginBottom:16, paddingLeft:0, color:"#9A9890"}} onClick={() => { setMode("choice"); setFile(null); setB64(null); setUploadError(""); }}>
        ← Retour
      </button>
      <div style={S.card}>
        <div style={S.cardHeader}><div style={S.cardTitle}>📄 Analyser un bon de livraison</div></div>
        <div style={S.modalBody}>
          <div
            style={{border:`2px dashed ${file ? "#1A8A5A" : "#E4E2D8"}`, borderRadius:12, padding:"28px 20px", textAlign:"center", cursor:"pointer", background: file ? "#EDFAF3" : "#F4F3EE", transition:"all 0.2s", marginBottom:14}}
            onClick={() => fileRef.current?.click()}
            onDragOver={e=>{e.preventDefault();}}
            onDrop={e=>{e.preventDefault(); handleFile(e.dataTransfer.files[0]);}}
          >
            <div style={{fontSize:40, marginBottom:8}}>{file ? "✅" : "📂"}</div>
            {file
              ? <><div style={{fontWeight:700, fontSize:14, color:"#1A8A5A"}}>{file.name}</div><div style={{fontSize:12, color:"#9A9890", marginTop:3}}>{(file.size/1024).toFixed(1)} Ko — prêt à analyser</div></>
              : <><div style={{fontWeight:700, fontSize:14, marginBottom:4}}>Glissez votre PDF ici</div><div style={{fontSize:12, color:"#9A9890"}}>ou appuyez pour choisir · PDF, JPG, PNG</div></>
            }
          </div>
          <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>

          {uploadError && (
            <div style={{...S.alert("warning"), marginBottom:12}}>
              <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.warn}/></svg>
              <div><div style={{fontWeight:700, marginBottom:2}}>Erreur</div><div style={{fontSize:12}}>{uploadError}</div></div>
            </div>
          )}

          {loading ? (
            <div style={{background:"#EEF2FD", border:"1px solid rgba(42,91,215,0.2)", borderRadius:10, padding:16, display:"flex", alignItems:"center", gap:14}}>
              <div style={S.spinner}/>
              <div>
                <div style={{fontWeight:700, color:"#2A5BD7", fontSize:14}}>Analyse en cours…</div>
                <div style={{fontSize:12, color:"#9A9890", marginTop:2}}>L'IA lit votre bon de livraison</div>
              </div>
            </div>
          ) : (
            <button
              style={{...S.btn(file ? "primary" : "secondary"), width:"100%", justifyContent:"center", padding:"11px", opacity: file ? 1 : 0.5}}
              onClick={analyze}
              disabled={!file}
            >
              <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.search}/></svg>
              {file ? "Analyser avec l'IA" : "Sélectionnez d'abord un fichier"}
            </button>
          )}
        </div>
      </div>
    </div>
  );

  // ── ÉCRAN COLLER JSON ──
  if (mode === "paste") return (
    <div style={{maxWidth:600}}>
      <button style={{...S.btn("ghost"), marginBottom:16, paddingLeft:0, color:"#9A9890"}} onClick={() => setMode("choice")}>
        ← Retour
      </button>
      <div style={S.card}>
        <div style={S.cardHeader}><div style={S.cardTitle}>📋 Coller le JSON de Claude</div></div>
        <div style={S.modalBody}>
          <div style={{...S.alert("info"), marginBottom:16}}>
            <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.info}/></svg>
            <div style={{fontSize:13}}>
              <strong>Mode d'emploi :</strong><br/>
              1. Dans ce chat Claude, envoyez votre PDF en pièce jointe<br/>
              2. Demandez : <em>"Analyse ce bon et génère le JSON"</em><br/>
              3. Copiez le JSON retourné et collez-le ci-dessous
            </div>
          </div>
          <div style={S.field}>
            <label style={S.fieldLabel}>JSON du bon de livraison</label>
            <textarea
              value={jsonText}
              onChange={e => { setJsonText(e.target.value); setJsonError(""); }}
              placeholder={'{"numero_bon":"WH/OUT/02342","numero_commande":"S02727","date":"2026-03-21","client":"COMPTOIR DU MARCHE","adresse":"...","lignes":[{"ref":"","nom":"Prosecco Extra Dry 750ml","quantite":18}]}'}
              style={{...S.input, height:160, resize:"vertical", fontFamily:"monospace", fontSize:12, lineHeight:1.5}}
            />
            {jsonError && <div style={{color:"#C0392B", fontSize:12, marginTop:4}}>{jsonError}</div>}
          </div>
          <button style={{...S.btn("primary"), width:"100%", justifyContent:"center", marginTop:14, padding:"11px"}} onClick={parseJson}>
            <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.check}/></svg>
            Charger le bon
          </button>
        </div>
      </div>
    </div>
  );

  // ── ÉCRAN RÉSULTAT (édition + validation) ──
  return (
    <div style={{maxWidth:600}}>
      <button style={{...S.btn("ghost"), marginBottom:16, paddingLeft:0, color:"#9A9890"}} onClick={reset}>
        ← Retour
      </button>
      <div style={S.card}>
        <div style={S.cardHeader}><div style={S.cardTitle}>✅ Vérifier et valider le bon</div></div>
        <div style={S.modalBody}>

          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14, paddingBottom:14, borderBottom:"1px solid #E4E2D8"}}>
            {[["N° Bon","number","text"],["N° Commande","commande","text"],["Date","date","date"],["Client","client","text"],["Adresse","addr","text"]].map(([label, key, type]) => (
              <Field key={key} label={label}>
                <input type={type} style={{...S.input, fontSize:13, padding:"7px 10px"}} value={result[key]||""} onChange={e=>setResult(r=>({...r,[key]:e.target.value}))}/>
              </Field>
            ))}
          </div>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
            <div style={{fontSize:11, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", color:"#9A9890"}}>Lignes produits ({result.lignes.length})</div>
            <button style={S.btn("secondary")} onClick={addLine}>+ Ligne</button>
          </div>
          <div style={{maxHeight:300, overflowY:"auto", marginBottom:14}}>
            {result.lignes.map((l, i) => {
              const matched = produits.find(p => matchProduit(l, p));
              return (
                <div key={i} style={{...S.parsedRow, paddingBottom:10, marginBottom:4}}>
                  <input style={{...S.input, fontSize:12, padding:"5px 8px", width:80, fontFamily:"monospace", flexShrink:0}} placeholder="REF" value={l.ref} onChange={e=>updateLine(i,"ref",e.target.value)}/>
                  <div style={{flex:1}}>
                    <input style={{...S.input, fontSize:13, padding:"5px 8px", width:"100%"}} placeholder="Nom du produit" value={l.name} onChange={e=>updateLine(i,"name",e.target.value)}/>
                    {matched && <div style={{fontSize:11, color:"#1A8A5A", marginTop:3}}>↔ {matched.name}</div>}
                  </div>
                  <input type="number" min={0} style={{...S.input, fontSize:13, fontWeight:700, padding:"5px 8px", width:64, textAlign:"right", color:"#C0392B", flexShrink:0}} value={l.qty} onChange={e=>updateLine(i,"qty",parseInt(e.target.value)||0)}/>
                  <button style={{...S.btn("ghost"), padding:"4px 6px", color:"#C0392B", flexShrink:0}} onClick={()=>removeLine(i)}><svg width={13} height={13} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2}><path d={Icons.x}/></svg></button>
                </div>
              );
            })}
          </div>
          <button style={{...S.btn("success"), width:"100%", justifyContent:"center", padding:"11px"}} onClick={validate}>
            <svg width={15} height={15} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2.5}><path d={Icons.check}/></svg>
            Valider et décompter le stock
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── HISTORY MODAL ───────────────────────────────────────────────────────────
function HistoryModal({ product: p, lines, onClose, openBon }) {
  const total = lines.reduce((s, l) => s + l.qty, 0);
  return (
    <Modal title={p.name} sub={`Réf: ${p.ref} · Stock actuel : ${p.stock}`} onClose={onClose} wide
      footer={<button style={S.btn("secondary")} onClick={onClose}>Fermer</button>}>
      <div style={{background:"#F4F3EE", borderRadius:10, padding:"14px 18px", marginBottom:16, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:14}}>
        <div><div style={S.bonInfoLabel}>Stock initial</div><div style={S.bonInfoValue}>{p.stockInit}</div></div>
        <div><div style={S.bonInfoLabel}>Stock actuel</div><div style={{...S.bonInfoValue, color: p.stock<=0?"#C0392B":p.stock<=5?"#C47A00":"#1A8A5A"}}>{p.stock}</div></div>
        <div><div style={S.bonInfoLabel}>Total sorti</div><div style={{...S.bonInfoValue, color:"#C0392B"}}>−{total}</div></div>
      </div>
      {lines.length === 0
        ? <div style={S.emptyState}><div style={{fontSize:32,marginBottom:8}}>📭</div><p>Aucune sortie enregistrée pour ce produit</p></div>
        : <>
          <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.07em", color:"#9A9890", marginBottom:10}}>Bons associés</div>
          {lines.map((l, i) => (
            <div key={i} style={S.historyItem} onClick={() => openBon(l.bon)}>
              <div>
                <span style={{fontFamily:"monospace", fontWeight:700, color:"#2A5BD7", fontSize:13}}>{l.bon.number}</span>
                <span style={{marginLeft:10, fontSize:12, color:"#9A9890"}}>{l.bon.client||"—"}</span>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:16}}>
                <span style={{fontSize:12, color:"#9A9890"}}>{fmtDate(l.bon.date)}</span>
                <span style={{fontWeight:700, color:"#C0392B", fontSize:13}}>−{l.qty} unité{l.qty>1?"s":""}</span>
              </div>
            </div>
          ))}
        </>}
    </Modal>
  );
}

// ─── BON MODAL ───────────────────────────────────────────────────────────────
function BonModal({ bon, onClose, onDelete }) {
  return (
    <Modal title={`Bon ${bon.number}`} sub={`${fmtDate(bon.date)} · ${bon.lignes.length} ligne(s)`} onClose={onClose} wide
      footer={<><button style={S.btn("danger")} onClick={onDelete}>Supprimer</button><button style={S.btn("secondary")} onClick={onClose}>Fermer</button></>}>
      <div style={{...S.bonHeader, gridTemplateColumns:"1fr 1fr"}}>
        <div><div style={S.bonInfoLabel}>N° Bon</div><div style={{...S.bonInfoValue, fontFamily:"monospace"}}>{bon.number}</div></div>
        <div><div style={S.bonInfoLabel}>N° Commande</div><div style={{...S.bonInfoValue, fontFamily:"monospace"}}>{bon.commande||"—"}</div></div>
        <div><div style={S.bonInfoLabel}>Client</div><div style={S.bonInfoValue}>{bon.client||"—"}</div></div>
        <div><div style={S.bonInfoLabel}>Adresse</div><div style={{...S.bonInfoValue, fontSize:13}}>{bon.addr||"—"}</div></div>
      </div>
      <table style={S.table}>
        <thead><tr>{["Référence","Produit","Qté sortie"].map(h=><th key={h} style={S.th}>{h}</th>)}</tr></thead>
        <tbody>{bon.lignes.map((l,i)=>(
          <tr key={i}>
            <td style={{...S.td,...S.tdRef}}>{l.ref||"—"}</td>
            <td style={{...S.td, fontWeight:500}}>{l.name}</td>
            <td style={{...S.td, fontWeight:800, color:"#C0392B", textAlign:"right"}}>−{l.qty}</td>
          </tr>
        ))}</tbody>
      </table>
    </Modal>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
